<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to i-Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --parchment: #f5edd6;
    --parchment-dk: #e8d9b5;
    --ink: #2c1f0e;
    --ink-lt: #5a3e20;
    --sepia: #8b6344;
    --sepia-lt: #b8945a;
    --gold: #c9922a;
    --gold-lt: #e8b84b;
    --green: #1a4a2e;
    --green-pale: #eaf3de;
    --green-lt: #c0dd97;
    --white: #fffdf7;
  }
  body {
    background: var(--parchment);
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  nav {
    background: var(--ink);
    border-bottom: 2px solid var(--gold);
    padding: 0 2.5rem;
    height: 56px;
    display: flex;
    align-items: center;
  }
  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--gold-lt);
    text-decoration: none;
  }
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--sepia-lt);
    border-top: 4px solid var(--green);
    border-radius: 3px;
    padding: 3rem 2.5rem;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .success-icon {
    width: 64px;
    height: 64px;
    background: var(--green-pale);
    border: 1px solid var(--green-lt);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .success-icon svg { color: var(--green); }
  h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .plan-badge {
    display: inline-block;
    background: var(--green-pale);
    border: 1px solid var(--green-lt);
    color: var(--green);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 1.5rem;
  }
  .message {
    font-size: 16px;
    color: var(--ink-lt);
    line-height: 1.8;
    margin-bottom: 1.5rem;
  }
  .message strong { color: var(--ink); font-weight: 500; }
  .next-steps {
    background: var(--parchment);
    border: 1px solid var(--parchment-dk);
    border-radius: 3px;
    padding: 1.25rem 1.5rem;
    text-align: left;
    margin-bottom: 1.75rem;
  }
  .next-steps h3 {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .next-steps ol {
    padding-left: 1.25rem;
  }
  .next-steps li {
    font-size: 15px;
    color: var(--ink-lt);
    line-height: 1.75;
    margin-bottom: 0.25rem;
  }
  .btn-gold {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 13px 28px;
    border-radius: 3px;
    text-decoration: none;
    border: none;
    cursor: pointer;
  }
  .btn-gold:hover { background: var(--gold-lt); }
  .loading { color: var(--sepia); font-size: 15px; }
  footer {
    background: #1a0e05;
    border-top: 2px solid var(--gold);
    padding: 1.5rem 2.5rem;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">i-scout.eu</a>
</nav>

<div class="main">
  <div class="card" id="card">
    <p class="loading">Loading your confirmation…</p>
  </div>
</div>

<footer>© 2026 i-scout.eu · Powered by Anthropic & Claude Advanced Vision</footer>

<script>
async function loadSession() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const card = document.getElementById('card');

  if (!sessionId) {
    card.innerHTML = `
      <h1>Something went wrong</h1>
      <p class="message">We couldn't find your session. Please contact <a href="mailto:alan@aka.ie" style="color:var(--gold);">alan@aka.ie</a> and we'll sort it out immediately.</p>
      <a href="/" class="btn-gold">Return to homepage</a>
    `;
    return;
  }

  try {
    const res = await fetch(`/session-details?session_id=${sessionId}`);
    const data = await res.json();

    card.innerHTML = `
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Your Scout is active</h1>
      <div class="plan-badge">◈ ${data.plan}</div>
      <p class="message">
        Welcome, <strong>${data.name}</strong>. Your i-Scout subscription is confirmed and your Scout is now watching for <strong>${data.category || 'your chosen category'}</strong>.<br><br>
        You'll receive a confirmation email at <strong>${data.email}</strong> shortly. The moment a genuine find appears, you'll be the first to know.
      </p>
      <div class="next-steps">
        <h3>What happens next</h3>
        <ol>
          <li>You'll receive a welcome email within the hour confirming your brief</li>
          <li>Your Scout begins monitoring eBay immediately</li>
          <li>When a match appears, you'll receive a standard alert with image and quick estimate</li>
          <li>Request a Deep Analysis on any find for the full professional appraisal</li>
        </ol>
      </div>
      <a href="/" class="btn-gold">Return to homepage</a>
    `;
  } catch (err) {
    card.innerHTML = `
      <h1>Payment confirmed</h1>
      <p class="message">Thank you — your subscription is active. We'll be in touch at your registered email address shortly to confirm your Scout brief.<br><br>
      Any questions, contact <a href="mailto:alan@aka.ie" style="color:var(--gold);">alan@aka.ie</a>.</p>
      <a href="/" class="btn-gold">Return to homepage</a>
    `;
  }
}

loadSession();
</script>

</body>
</html>
